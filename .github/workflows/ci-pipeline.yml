# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - name: 1. Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: 2. Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Instalar dependencias del proyecto
      run: npm install

    - name: 4. Ejecutar la Build Local en el Servidor
      run: npm run build

    - name: 5. Inspeccion de codigo (Linter)
      run: npm run lint

    - name: 6. Ejecutar la Prueba Automatizada
      run: npm test

    - name: Notificacion de Exito 🟢
      if: success()
      run: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d '{"content": "🚀 **CI/CD Exitoso**: La build y los tests pasaron correctamente en la rama main. Desplegando en Render..."}' \
        ${{ secrets.DISCORD_WEBHOOK }}

    - name: Notificacion de Fallo 🔴
      if: failure()
      run: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d '{"content": "⚠️ **CI/CD Falló**: La build, el linter o las pruebas automatizadas han fallado. El despliegue ha sido cancelado."}' \
        ${{ secrets.DISCORD_WEBHOOK }}
