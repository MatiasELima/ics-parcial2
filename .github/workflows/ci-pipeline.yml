name: Pipeline de Integracion Continua Multi-Job

on:
  push:
    branches: [ "main" ]

jobs:
  # ----------------------------------------------------
  # JOB 1: Inspección de código y Sintaxis (Linter)
  # ----------------------------------------------------
  calidad_codigo:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias
      run: npm install

    - name: Ejecutar Linter 🔍
      run: npm run lint

    - name: Feedback si falla el linter
      if: failure()
      run: |
        # Conseguimos la hora actual de Argentina/región (GMT-3)
        TZ="America/Argentina/Buenos_Aires"
        HORA=$(date +"%d/%m/%Y %H:%M:%S")
        
        curl -H "Content-Type: application/json" -X POST \
        -d '{
          "embeds": [{
            "title": "❌ Pipeline Interrumpido - Fallo en la etapa de calidad",
            "description": "El proceso de CI/CD se ha detenido debido a un error crítico.",
            "color": 15158332, 
            "fields": [
              { "name": "💻 Último Commit", "value": "`${{ github.event.head_commit.message }}`", "inline": false },
              { "name": "👤 Autor", "value": "${{ github.actor }}", "inline": true },
              { "name": "🌿 Rama", "value": "`${{ github.ref_name }}`", "inline": true },
              { "name": "⏱️ Momento del Fallo", "value": "'"$HORA"'", "inline": false }
            ],
            "footer": { "text": "Revisá los logs en GitHub Actions para más detalles." }
          }]
        }' \
        ${{ secrets.DISCORD_WEBHOOK }}

  # ----------------------------------------------------
  # JOB 2: Pruebas Lógicas (Solo corre si el Job 1 pasa)
  # ----------------------------------------------------
  pruebas_unitarias:
    runs-on: ubuntu-latest
    needs: calidad_codigo # 👈 Esto obliga a respetar el orden secuencial
    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias
      run: npm install

    - name: Ejecutar Tests Automatizados 🧪
      run: npm test

    - name: Feedback si fallan los Tests 🔴
      if: failure()
      run: |
        # Conseguimos la hora actual de Argentina/región (GMT-3)
        TZ="America/Argentina/Buenos_Aires"
        HORA=$(date +"%d/%m/%Y %H:%M:%S")
        
        curl -H "Content-Type: application/json" -X POST \
        -d '{
          "embeds": [{
            "title": "❌ Pipeline Interrumpido - Fallo en la etapa de logica",
            "description": "El proceso de CI/CD se ha detenido debido a un error crítico.",
            "color": 15158332, 
            "fields": [
              { "name": "💻 Último Commit", "value": "`${{ github.event.head_commit.message }}`", "inline": false },
              { "name": "👤 Autor", "value": "${{ github.actor }}", "inline": true },
              { "name": "🌿 Rama", "value": "`${{ github.ref_name }}`", "inline": true },
              { "name": "⏱️ Momento del Fallo", "value": "'"$HORA"'", "inline": false }
            ],
            "footer": { "text": "Revisá los logs en GitHub Actions para más detalles." }
          }]
        }' \
        ${{ secrets.DISCORD_WEBHOOK }}

  # ----------------------------------------------------
  # JOB 3: Análisis de Seguridad y Éxito Total
  # ----------------------------------------------------
  analisis_seguridad:
    runs-on: ubuntu-latest
    needs: pruebas_unitarias # Solo corre si pasaron los tests
    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 👈 Importante: Sonar necesita el historial completo de Git

    - name: Analisis con SonarCloud 📊
      uses: sonarsource/sonarcloud-github-action@v3
      with:
        # ⚠️ ESTA LÍNEA ES LA MAGIA: Obliga al pipeline a esperar el veredicto de Sonar
        args: -Dsonar.qualitygate.wait=true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Ya lo provee GitHub por defecto
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # El que guardaste en Secrets

    - name: Feedback de Exito Total 🟢
      if: success()
      run: |
        TZ="America/Argentina/Buenos_Aires"
        HORA=$(date +"%d/%m/%Y %H:%M:%S")
        
        curl -H "Content-Type: application/json" -X POST \
        -d '{
          "embeds": [{
            "title": "🚀 Pipeline Exitoso - ¡Todo Verde!",
            "description": "Calidad, Lógica y Seguridad aprobadas al 100%. Código seguro listo en Render.",
            "color": 3066993,
            "fields": [
              { "name": "💻 Commit Desplegado", "value": "`${{ github.event.head_commit.message }}`", "inline": false },
              { "name": "👤 Autor", "value": "${{ github.actor }}", "inline": true },
              { "name": "🌿 Rama", "value": "`${{ github.ref_name }}`", "inline": true },
              { "name": "⏱️ Fecha de Despliegue", "value": "'"$HORA"'", "inline": false }
            ]
          }]
        }' \
        ${{ secrets.DISCORD_WEBHOOK }}

    - name: Feedback si falla SonarQube 🔴
      if: failure()
      run: |
        # Conseguimos la hora actual de Argentina/región (GMT-3)
        TZ="America/Argentina/Buenos_Aires"
        HORA=$(date +"%d/%m/%Y %H:%M:%S")
        
        curl -H "Content-Type: application/json" -X POST \
        -d '{
          "embeds": [{
            "title": "❌ Pipeline Interrumpido - Fallo en Sonarqube",
            "description": "El proceso de CI/CD se ha detenido debido a un error crítico.",
            "color": 15158332, 
            "fields": [
              { "name": "💻 Último Commit", "value": "`${{ github.event.head_commit.message }}`", "inline": false },
              { "name": "👤 Autor", "value": "${{ github.actor }}", "inline": true },
              { "name": "🌿 Rama", "value": "`${{ github.ref_name }}`", "inline": true },
              { "name": "⏱️ Momento del Fallo", "value": "'"$HORA"'", "inline": false }
            ],
            "footer": { "text": "Revisá los logs en GitHub Actions para más detalles." }
          }]
        }' \
        ${{ secrets.DISCORD_WEBHOOK }}
